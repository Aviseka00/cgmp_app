# Render Blueprint: https://render.com/docs/blueprint-spec
# After connecting this repo, set secrets in the dashboard (MongoDB URI, optional paths).

services:
  - type: web
    name: cgmp-cell-app
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: cgmp_cell_app
      # Required for analysis (vendor these into the repo or adjust paths):
      - key: BEST_MODEL_PATH
        sync: false
      - key: CELL_DETECTION_DIR
        sync: false
      # Production: disable seed admin after creating accounts
      # - key: DISABLE_SEED_ADMIN
      #   value: "true"
